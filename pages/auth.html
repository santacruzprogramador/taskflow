<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - TaskFlow</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="../index.html" class="back-home">
                    <i class="fas fa-arrow-left"></i> Volver al inicio
                </a>
            <div class="logo">
                    <i class="fas fa-tasks"></i>
                    <h2>TaskFlow</h2>
            </div>
                <h1>Iniciar Sesión</h1>
                <p>Accede a tu cuenta para gestionar tus tareas</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Correo Electrónico
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="tu@email.com"
                    autocomplete="email"
                >
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Contraseña
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        placeholder="••••••••"
                        autocomplete="current-password"
                    >
                    <button type="button" id="togglePassword" class="toggle-password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe">
                        <span>Recordarme</span>
                    </label>
                    <a href="reset-password.html" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>

                <div id="emailNotConfirmedMessage" style="display:none;">
                    <p>Tu correo no está confirmado.</p>
                    <button type="button" id="resendEmailBtn">
                    Reenviar correo de confirmación
                    </button>
                </div>

                <div class="divider">
                    <span>o continuar con</span>
                </div>

                <button type="button" id="githubRegister" class="btn btn-github btn-block">
                    <i class="fab fa-github"></i> GitHub
                </button>

                <div class="auth-footer">
                    <p>¿No tienes una cuenta? <a href="register.html">Regístrate aquí</a></p>
                </div>
            </form>

            <div id="authMessage" class="message hidden"></div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.0/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>


</body>
</html>
