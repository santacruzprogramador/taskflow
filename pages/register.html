<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - TaskFlow</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="../index.html" class="back-home">
                    <i class="fas fa-arrow-left"></i> Volver al inicio
                </a>
                <div class="logo">
                    <i class="fas fa-tasks"></i>
                    <h2>TaskFlow</h2>
                </div>
                <h1>Crear Cuenta</h1>
                <p>Comienza a organizar tus tareas hoy mismo</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="fullName">
                        <i class="fas fa-user"></i> Nombre Completo
                    </label>
                    <input 
                    type="text" 
                    id="fullName" 
                    name="fullName" 
                    required 
                    placeholder="Tu nombre completo"
                    autocomplete="name"
                    pattern="^\S+\s+\S+.*$"
                    title="Debe contener al menos dos palabras"
                    >
                </div>

                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Correo Electrónico
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required 
                        placeholder="tu@email.com"
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Contraseña
                    </label>
                    <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    placeholder="••••••••"
                    autocomplete="new-password"
                    minlength="6"
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{6,}$"
                    title="Debe incluir mayúsculas, minúsculas, número y símbolo"
                    >
                    <button type="button" id="togglePassword" class="toggle-password">
                        <i class="fas fa-eye"></i>
                    </button>
                    <small class="password-hint">Mínimo 6 caracteres</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-lock"></i> Confirmar Contraseña
                    </label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        required 
                        placeholder="••••••••"
                        autocomplete="new-password"
                    >
                    <button type="button" id="toggleConfirmPassword" class="toggle-password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div class="form-group">
                    <label class="checkbox">
                        <input type="checkbox" id="terms" required>
                        <span>Acepto los 
                            <a href="terms.html">términos y condiciones</a> 
                            y la 
                            <a href="privacy.html">política de privacidad</a>
                        </span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-user-plus"></i> Crear Cuenta
                </button>

                <div class="divider">
                    <span>o registrarse con</span>
                </div>

                <button type="button" id="githubRegister" class="btn btn-github btn-block">
                    <i class="fab fa-github"></i> GitHub
                </button>

                <div class="auth-footer">
                    <p>¿Ya tienes una cuenta? <a href="auth.html">Inicia sesión aquí</a></p>
                </div>
            </form>

            <div id="authMessage" class="message hidden"></div>
        </div>
    </div>

    <!--Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>

</body>
</html>
