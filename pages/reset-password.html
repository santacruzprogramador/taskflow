<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - TaskFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">

</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <a href="auth.html" class="back-home">
                <i class="fas fa-arrow-left"></i> Volver al login
            </a>

            <div class="auth-header">
                <h1>Restablecer Contraseña</h1>
                <p>Ingresa tu correo para recibir un enlace de recuperación.</p>
            </div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="resetEmail"><i class="fas fa-envelope"></i> Correo Electrónico</label>
                    <input type="email" id="resetEmail" placeholder="tu@email.com" required>
                </div>

                <button type="submit" class="btn">Enviar enlace</button>

                <div id="resetMessage" class="message" style="display:none;"></div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.0/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script>
        const resetForm = document.getElementById("resetPasswordForm");
        const resetMessage = document.getElementById("resetMessage");

        resetForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("resetEmail").value;

            resetMessage.style.display = "none";
            resetMessage.className = "message";

            try {
                const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: `${window.location.origin}/auth.html`
                });

                if (error) throw error;

                resetMessage.textContent = "Enlace de recuperación enviado correctamente.";
                resetMessage.classList.add("success");
                resetMessage.style.display = "block";

            } catch (err) {
                resetMessage.textContent = err.message;
                resetMessage.classList.add("error");
                resetMessage.style.display = "block";
            }
        });
    </script>
</body>
</html>
